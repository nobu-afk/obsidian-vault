    <style>
        .sub-hero { padding: 80px 0 48px; text-align: center; background: linear-gradient(180deg, #f8fafc 0%, #ffffff 100%); border-bottom: 1px solid #e5e7eb; }
        .sub-hero .eyebrow { font-size: 13px; font-weight: 700; color: #64748b; letter-spacing: 0.18em; margin-bottom: 14px; }
        .sub-hero h1 { font-size: 32px; font-weight: 900; color: #0f172a; letter-spacing: 0.02em; margin: 0 0 18px; line-height: 1.4; word-break: keep-all; overflow-wrap: anywhere; }
        .sub-hero .lead { font-size: 15px; color: #475569; line-height: 1.85; max-width: 620px; margin: 0 auto; }
        .breadcrumb { padding: 16px 0; font-size: 12px; color: #94a3b8; letter-spacing: 0.04em; }
        .breadcrumb a { color: #64748b; text-decoration: none; }

        .contact-section { padding: 56px 0 80px; }
        .contact-form-wrap { max-width: 640px; margin: 0 auto; }
        .form-group { margin: 0 0 24px; }
        .form-label { display: block; font-size: 13px; font-weight: 700; color: #0f172a; letter-spacing: 0.04em; margin: 0 0 8px; }
        .form-label .required { display: inline-block; margin-left: 6px; padding: 2px 7px; background: #b8a88a; color: #ffffff; font-size: 10px; font-weight: 700; border-radius: 2px; letter-spacing: 0.06em; vertical-align: 2px; }
        .form-input, .form-textarea, .form-select { width: 100%; padding: 12px 14px; font-size: 14px; color: #0f172a; background: #ffffff; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; font-family: inherit; transition: border-color 0.2s; }
        .form-input:focus, .form-textarea:focus, .form-select:focus { outline: none; border-color: #0f172a; }
        .form-textarea { min-height: 160px; resize: vertical; line-height: 1.7; }
        .form-submit-wrap { margin-top: 32px; text-align: center; }
        .form-submit { display: inline-block; padding: 14px 48px; background: #0f172a; color: #ffffff; border: none; border-radius: 4px; font-size: 14px; font-weight: 700; letter-spacing: 0.08em; cursor: pointer; transition: background 0.2s; font-family: inherit; }
        .form-submit:hover { background: #1e293b; }

        @media (max-width: 640px) {
            .sub-hero { padding: 56px 0 36px; }
            .sub-hero h1 { font-size: 26px; }
        }
    </style>

<link rel="stylesheet" href="https://growthfix.jp/assets/css/mobile.css?v=20260507">

</div>

    <main id="main">
        <section class="sub-hero">
            <div class="container">
                <p class="eyebrow">CONTACT</p>
                <h1>お問い合わせ</h1>
                <p class="lead">サービスのご相談・取材依頼・その他ご質問はこちらから。<br>通常 2 営業日以内にご返信いたします。</p>
            </div>
        </section>

        <div class="container">
            <p class="breadcrumb"><a href="https://growthfix.jp/">ホーム</a> ／ お問い合わせ</p>
        </div>

        <section class="contact-section">
            <div class="contact-form-wrap">
                <form action="https://utage-system.com/r/Mbii5hPchyIQ/store" method="post">
                    <div class="form-group">
                        <label class="form-label" for="your-name">お名前 <span class="required">必須</span></label>
                        <input type="text" id="your-name" name="your-name" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="your-company">会社名</label>
                        <input type="text" id="your-company" name="your-company" class="form-input">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="your-email">メールアドレス <span class="required">必須</span></label>
                        <input type="email" id="your-email" name="your-email" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="your-subject">お問い合わせ種別</label>
                        <select id="your-subject" name="your-subject" class="form-select">
                            <option value="サービスについて">サービスについて</option>
                            <option value="取材・メディア掲載依頼">取材・メディア掲載依頼</option>
                            <option value="講演・セミナー依頼">講演・セミナー依頼</option>
                            <option value="協業・パートナーシップ">協業・パートナーシップ</option>
                            <option value="その他">その他</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="your-message">お問い合わせ内容 <span class="required">必須</span></label>
                        <textarea id="your-message" name="your-message" class="form-textarea" required placeholder="ご相談内容を具体的にお書きください。"></textarea>
                    </div>

                    <div class="form-submit-wrap">
                        <button type="submit" class="form-submit">送信する →</button>
                    </div>
                </form>
            </div>
        </section>
    </main>


    <script src="https://growthfix.jp/gravity/site-chrome.js?v=20260504a" defer></script>
