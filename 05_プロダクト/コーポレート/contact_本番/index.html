<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GrowthFix へのお問い合わせフォーム。サービスのご相談・取材依頼・その他ご質問はこちらから。通常 2 営業日以内にご返信いたします。">
    <title>お問い合わせ｜GrowthFix</title>
    <meta property="og:title" content="お問い合わせ｜GrowthFix" />
    <meta property="og:description" content="サービスのご相談・取材依頼・その他ご質問はこちらから。" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://growthfix.jp/contact/" />
    <meta property="og:image" content="https://growthfix.jp/gravity/ogp.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://growthfix.jp/gravity/ogp.png" />
    <link rel="canonical" href="https://growthfix.jp/contact/">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231b1b1b'/><text x='16' y='22' text-anchor='middle' font-size='18' font-family='serif' fill='%23b8a88a'>G</text></svg>">
    <!-- GA4 + GTM + Meta Pixel via /assets/js/tracking.js -->
    <script src="https://growthfix.jp/assets/js/tracking.js" defer></script>
    <link rel="stylesheet" href="https://growthfix.jp/assets/css/wp-theme-purged.css?v=20260425a">
    <link rel="stylesheet" href="https://growthfix.jp/gravity/styles.css?v=20260424">
    <link rel="stylesheet" href="/assets/css/corporate-page.css?v=20260512c">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* sub-hero / form 共通は /assets/css/corporate-page.css に集約（260512 Phase 1） */
        .contact-section { padding: 56px 0 80px; }
        .contact-form-wrap { max-width: 640px; margin: 0 auto; }
    </style>
<!-- 共通モバイル最適化パッチ（260427）-->
<link rel="stylesheet" href="https://growthfix.jp/assets/css/mobile.css?v=20260507">
  <script src="https://growthfix.jp/assets/js/ab-test.js?v=20260429a" defer></script>
  <script src="https://growthfix.jp/assets/js/seminar-bar.js?v=20260430b" defer></script>
</head>
<body>

    <main id="main">
        <section class="sub-hero">
            <div class="container">
                <p class="eyebrow">CONTACT</p>
                <h1>お問い合わせ</h1>
                <p class="lead">サービスのご相談・取材依頼・その他ご質問はこちらから。<br>通常 2 営業日以内にご返信いたします。</p>
            </div>
        </section>

        <div class="container">
            <p class="breadcrumb"><a href="https://growthfix.jp/">ホーム</a> ／ お問い合わせ</p>
        </div>

        <section class="contact-section">
            <div class="contact-form-wrap">
                <form action="https://utage-system.com/r/Mbii5hPchyIQ/store" method="post">
                    <div class="form-group">
                        <label class="form-label" for="your-name">お名前 <span class="required">必須</span></label>
                        <input type="text" id="your-name" name="your-name" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="your-company">会社名</label>
                        <input type="text" id="your-company" name="your-company" class="form-input">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="your-email">メールアドレス <span class="required">必須</span></label>
                        <input type="email" id="your-email" name="your-email" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="your-subject">お問い合わせ種別</label>
                        <select id="your-subject" name="your-subject" class="form-select">
                            <option value="サービスについて">サービスについて</option>
                            <option value="取材・メディア掲載依頼">取材・メディア掲載依頼</option>
                            <option value="講演・セミナー依頼">講演・セミナー依頼</option>
                            <option value="協業・パートナーシップ">協業・パートナーシップ</option>
                            <option value="その他">その他</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="your-message">お問い合わせ内容 <span class="required">必須</span></label>
                        <textarea id="your-message" name="your-message" class="form-textarea" required placeholder="ご相談内容を具体的にお書きください。"></textarea>
                    </div>

                    <div class="form-submit-wrap">
                        <button type="submit" class="form-submit">送信する →</button>
                    </div>
                </form>
            </div>
        </section>
    </main>


    <script src="https://growthfix.jp/gravity/site-chrome.js?v=20260511b" defer></script>
    <script src="https://growthfix.jp/gravity/script.js?v=20260409" defer></script>
</body>
</html>
