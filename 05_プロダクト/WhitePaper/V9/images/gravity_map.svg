<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 620" width="820" height="620" font-family="'Noto Sans JP', sans-serif">
  <!-- Background -->
  <rect width="820" height="620" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="410" y="40" text-anchor="middle" font-size="18" font-weight="900" fill="#0f172a">Gravityマップ：事業の伸ばし方4パターン</text>

  <!-- Axis lines -->
  <!-- Vertical center -->
  <line x1="410" y1="70" x2="410" y2="540" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Horizontal center -->
  <line x1="70" y1="305" x2="750" y2="305" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Outer border axes -->
  <line x1="70" y1="70" x2="70" y2="540" stroke="#334155" stroke-width="2"/>
  <line x1="70" y1="540" x2="750" y2="540" stroke="#334155" stroke-width="2"/>

  <!-- Y-axis arrow -->
  <line x1="70" y1="70" x2="70" y2="38" stroke="#334155" stroke-width="2"/>
  <polygon points="70,30 64,44 76,44" fill="#334155"/>
  <!-- X-axis arrow -->
  <line x1="750" y1="540" x2="782" y2="540" stroke="#334155" stroke-width="2"/>
  <polygon points="790,540 774,535 774,545" fill="#334155"/>

  <!-- Y-axis labels (1.5x up from 9/10 to 14/15) -->
  <text x="60" y="76" text-anchor="end" font-size="14" font-weight="700" fill="#334155">仕組みで回す</text>
  <text x="60" y="540" text-anchor="end" font-size="14" font-weight="700" fill="#334155">人で回す</text>
  <text x="32" y="308" text-anchor="middle" font-size="15" fill="#0f172a" font-weight="900" transform="rotate(-90,32,308)">仕組み化レベル</text>

  <!-- X-axis labels -->
  <text x="78" y="562" text-anchor="start" font-size="14" font-weight="700" fill="#334155">今を回す</text>
  <text x="742" y="562" text-anchor="end" font-size="14" font-weight="700" fill="#334155">次を作る</text>
  <text x="410" y="592" text-anchor="middle" font-size="15" fill="#0f172a" font-weight="900">経営者の視点</text>

  <!-- ❶ 社長独走 (left-bottom) -->
  <rect x="78" y="313" width="324" height="219" fill="#e2e8f0" rx="6"/>
  <text x="240" y="352" text-anchor="middle" font-size="30" fill="#334155">❶</text>
  <text x="240" y="384" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">社長独走</text>
  <text x="240" y="408" text-anchor="middle" font-size="13" fill="#475569">今を回す × 人で回す</text>
  <text x="240" y="438" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">CEO関与度：80–100%</text>
  <text x="240" y="466" text-anchor="middle" font-size="12" fill="#64748b">社長が全決定を担い、</text>
  <text x="240" y="486" text-anchor="middle" font-size="12" fill="#64748b">組織が自走しない状態</text>

  <!-- ❷ 人力拡大 (right-bottom) -->
  <rect x="418" y="313" width="324" height="219" fill="#e2e8f0" rx="6"/>
  <text x="580" y="352" text-anchor="middle" font-size="30" fill="#334155">❷</text>
  <text x="580" y="384" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">人力拡大</text>
  <text x="580" y="408" text-anchor="middle" font-size="13" fill="#475569">次を作る × 人で回す</text>
  <text x="580" y="438" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">CEO関与度：60–80%</text>
  <text x="580" y="466" text-anchor="middle" font-size="12" fill="#64748b">採用で解決しようとするが、</text>
  <text x="580" y="486" text-anchor="middle" font-size="12" fill="#64748b">人が増えるほど複雑化する</text>

  <!-- ❸ 施策先行 (left-top) -->
  <rect x="78" y="78" width="324" height="219" fill="#cbd5e1" rx="6"/>
  <text x="240" y="117" text-anchor="middle" font-size="30" fill="#334155">❸</text>
  <text x="240" y="149" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">施策先行</text>
  <text x="240" y="173" text-anchor="middle" font-size="13" fill="#475569">今を回す × 仕組みで回す</text>
  <text x="240" y="203" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">CEO関与度：40–60%</text>
  <text x="240" y="231" text-anchor="middle" font-size="12" fill="#475569">制度・ツールを導入するが、</text>
  <text x="240" y="251" text-anchor="middle" font-size="12" fill="#475569">経営者の思想が乗っていない</text>

  <!-- ❹ グラビティ型成長 (right-top) - special treatment -->
  <rect x="418" y="78" width="324" height="219" fill="#0f172a" rx="6"/>
  <rect x="418" y="78" width="324" height="219" fill="none" stroke="#64748b" stroke-width="3" rx="6"/>
  <text x="580" y="114" text-anchor="middle" font-size="30" fill="white">❹</text>
  <text x="580" y="144" text-anchor="middle" font-size="19" font-weight="900" fill="white">グラビティ型成長</text>
  <text x="580" y="167" text-anchor="middle" font-size="13" fill="#cbd5e1">次を作る × 仕組みで回す</text>
  <text x="580" y="194" text-anchor="middle" font-size="13" font-weight="700" fill="#e2e8f0">CEO関与度：20–40%</text>
  <text x="580" y="222" text-anchor="middle" font-size="13" font-weight="700" fill="white">引力が、すべてを</text>
  <text x="580" y="244" text-anchor="middle" font-size="13" font-weight="700" fill="white">引き寄せるように──</text>
  <text x="580" y="273" text-anchor="middle" font-size="12" fill="#94a3b8" font-style="italic">← 目指すべき状態</text>
</svg>
